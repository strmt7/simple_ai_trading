<svg xmlns="http://www.w3.org/2000/svg" width="1240" height="560" viewBox="0 0 1240 560" role="img" aria-labelledby="title desc">
<title id="title">Round 30 probability-of-profit discrimination by evaluation window</title>
<desc id="desc">Long and short adverse-stress ROC AUC for threshold selection from June 21 to 25 and policy validation from June 26 to 30, 2023. The policy window has been reused across research rounds. A dashed line marks random discrimination at 0.5.</desc>
<rect width="100%" height="100%" fill="#ffffff"/>
<text x="48" y="48" font-family="Segoe UI, Arial, sans-serif" font-size="27" font-weight="700" fill="#17212b">Probability-of-profit discrimination</text>
<text x="48" y="78" font-family="Segoe UI, Arial, sans-serif" font-size="14" fill="#53616d">Adverse-stress outcomes; ROC AUC above 0.5 indicates discrimination better than chance.</text>
<rect x="90" y="130" width="1080" height="300" fill="#ffffff" stroke="#d8e0e7"/>
<line x1="90" y1="430.0" x2="1170" y2="430.0" stroke="#e6ebef" stroke-width="1" stroke-dasharray="none"/>
<text x="78" y="435.0" text-anchor="end" font-family="Segoe UI, Arial, sans-serif" font-size="12" fill="#60717f">0.00</text>
<line x1="90" y1="355.0" x2="1170" y2="355.0" stroke="#e6ebef" stroke-width="1" stroke-dasharray="none"/>
<text x="78" y="360.0" text-anchor="end" font-family="Segoe UI, Arial, sans-serif" font-size="12" fill="#60717f">0.25</text>
<line x1="90" y1="280.0" x2="1170" y2="280.0" stroke="#6e7d88" stroke-width="2" stroke-dasharray="7 6"/>
<text x="78" y="285.0" text-anchor="end" font-family="Segoe UI, Arial, sans-serif" font-size="12" fill="#60717f">0.50</text>
<line x1="90" y1="205.0" x2="1170" y2="205.0" stroke="#e6ebef" stroke-width="1" stroke-dasharray="none"/>
<text x="78" y="210.0" text-anchor="end" font-family="Segoe UI, Arial, sans-serif" font-size="12" fill="#60717f">0.75</text>
<line x1="90" y1="130.0" x2="1170" y2="130.0" stroke="#e6ebef" stroke-width="1" stroke-dasharray="none"/>
<text x="78" y="135.0" text-anchor="end" font-family="Segoe UI, Arial, sans-serif" font-size="12" fill="#60717f">1.00</text>
<rect x="181.0" y="251.8" width="88" height="178.2" fill="#16827a"/>
<text x="225.0" y="241.8" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="13" font-weight="700" fill="#253744">0.594</text>
<text x="225.0" y="458" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="13" fill="#334653">Threshold selection long</text>
<text x="225.0" y="478" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="11" fill="#6b7882">2023-06-21 to 2023-06-25</text>
<rect x="421.0" y="264.6" width="88" height="165.4" fill="#8d5aa7"/>
<text x="465.0" y="254.6" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="13" font-weight="700" fill="#253744">0.551</text>
<text x="465.0" y="458" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="13" fill="#334653">Threshold selection short</text>
<text x="465.0" y="478" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="11" fill="#6b7882">2023-06-21 to 2023-06-25</text>
<rect x="661.0" y="262.5" width="88" height="167.5" fill="#16827a"/>
<text x="705.0" y="252.5" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="13" font-weight="700" fill="#253744">0.558</text>
<text x="705.0" y="458" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="13" fill="#334653">Policy validation (reused) long</text>
<text x="705.0" y="478" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="11" fill="#6b7882">2023-06-26 to 2023-06-30</text>
<rect x="901.0" y="246.0" width="88" height="184.0" fill="#8d5aa7"/>
<text x="945.0" y="236.0" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="13" font-weight="700" fill="#253744">0.613</text>
<text x="945.0" y="458" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="13" fill="#334653">Policy validation (reused) short</text>
<text x="945.0" y="478" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="11" fill="#6b7882">2023-06-26 to 2023-06-30</text>
<text x="34" y="285" transform="rotate(-90 34 285)" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="13" fill="#51606d">ROC AUC</text>
<text x="48" y="532" font-family="Segoe UI, Arial, sans-serif" font-size="13" fill="#65727d">ROC AUC alone does not establish a net-of-cost edge; all precommitted risk controls remained binding.</text>
</svg>
