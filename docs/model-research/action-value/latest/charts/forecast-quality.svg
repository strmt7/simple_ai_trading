<text x="465.0" y="247.8" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="13" font-weight="700" fill="#253744">0.574</text>
<text x="465.0" y="458" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="13" fill="#334653">Calibration short</text>
<text x="465.0" y="478" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="11" fill="#6b7882">2023-06-21 to 2023-06-25</text>
