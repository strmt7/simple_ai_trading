<svg xmlns="http://www.w3.org/2000/svg" width="1300" height="560" viewBox="0 0 1300 560" role="img" aria-labelledby="title desc">
<title id="title">Round 31 probability-of-profit discrimination</title>
<desc id="desc">Adverse-stress ROC AUC by opened stage and side, with exact UTC windows and a chance reference at 0.5.</desc>
<rect width="100%" height="100%" fill="#ffffff"/>
<text x="48" y="50" font-family="Segoe UI, Arial, sans-serif" font-size="28" font-weight="700" fill="#17212b">Forecast discrimination across opened stages</text>
<text x="48" y="82" font-family="Segoe UI, Arial, sans-serif" font-size="14" fill="#53616d">ROC AUC is diagnostic evidence, not an after-cost profitability result.</text>
<rect x="90" y="140" width="1140" height="280" fill="#ffffff" stroke="#d8e0e7"/>
<line x1="90" y1="420.0" x2="1230" y2="420.0" stroke="#e6ebef" stroke-width="1" stroke-dasharray="none"/>
<text x="78" y="425.0" text-anchor="end" font-family="Segoe UI, Arial, sans-serif" font-size="11" fill="#60717f">0.00</text>
<line x1="90" y1="350.0" x2="1230" y2="350.0" stroke="#e6ebef" stroke-width="1" stroke-dasharray="none"/>
<text x="78" y="355.0" text-anchor="end" font-family="Segoe UI, Arial, sans-serif" font-size="11" fill="#60717f">0.25</text>
<line x1="90" y1="280.0" x2="1230" y2="280.0" stroke="#687985" stroke-width="2" stroke-dasharray="7 6"/>
<text x="78" y="285.0" text-anchor="end" font-family="Segoe UI, Arial, sans-serif" font-size="11" fill="#60717f">0.50</text>
<line x1="90" y1="210.0" x2="1230" y2="210.0" stroke="#e6ebef" stroke-width="1" stroke-dasharray="none"/>
<text x="78" y="215.0" text-anchor="end" font-family="Segoe UI, Arial, sans-serif" font-size="11" fill="#60717f">0.75</text>
<line x1="90" y1="140.0" x2="1230" y2="140.0" stroke="#e6ebef" stroke-width="1" stroke-dasharray="none"/>
<text x="78" y="145.0" text-anchor="end" font-family="Segoe UI, Arial, sans-serif" font-size="11" fill="#60717f">1.00</text>
<rect x="333.0" y="258.1" width="84.0" height="161.9" fill="#16827a"/>
<text x="375.0" y="249.1" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="12" font-weight="700" fill="#263744">0.578</text>
<text x="375.0" y="449" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="11" fill="#334653">Confirmation long</text>
<text x="375.0" y="468" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="9" fill="#6b7882">2024-01-01 to 2024-02-04</text>
<rect x="903.0" y="256.5" width="84.0" height="163.5" fill="#8d5aa7"/>
<text x="945.0" y="247.5" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="12" font-weight="700" fill="#263744">0.584</text>
<text x="945.0" y="449" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="11" fill="#334653">Confirmation short</text>
<text x="945.0" y="468" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="9" fill="#6b7882">2024-01-01 to 2024-02-04</text>
<text x="34" y="280" transform="rotate(-90 34 280)" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="13" fill="#51606d">ROC AUC</text>
<text x="48" y="530" font-family="Segoe UI, Arial, sans-serif" font-size="13" fill="#65727d">All dates are UTC. Brier score and ranked-tail data remain available in forecast.csv.</text>
</svg>
