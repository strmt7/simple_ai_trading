<svg xmlns="http://www.w3.org/2000/svg" width="1500" height="700" viewBox="0 0 1500 700" role="img" aria-labelledby="title desc">
<title id="title">Monthly after-cost return</title>
<desc id="desc">Base is solid and stress is dashed; every series comes from the fixed replay ledger.</desc>
<rect width="100%" height="100%" fill="#ffffff"/>
<style>text{font-family:"Segoe UI",Arial,sans-serif;letter-spacing:0}.title{font-size:27px;font-weight:700;fill:#17212b}.subtitle{font-size:14px;fill:#52606d}.label{font-size:13px;fill:#263746}.axis{font-size:12px;fill:#60717f}.value{font-size:12px;font-weight:650;fill:#263746}.note{font-size:12px;fill:#65727d}.grid{stroke:#e1e8ed;stroke-width:1}.zero{stroke:#526674;stroke-width:2;stroke-dasharray:6 5}</style>
<text x="56" y="52" class="title">Monthly after-cost return</text>
<text x="56" y="80" class="subtitle">Base is solid and stress is dashed; every series comes from the fixed replay ledger.</text>
