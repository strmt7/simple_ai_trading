<svg xmlns="http://www.w3.org/2000/svg" width="1500" height="620" viewBox="0 0 1500 620" role="img" aria-labelledby="title desc">
<title id="title">After-cost evidence by research round</title>
<desc id="desc">Simulated-trade means, overlapping-forecast diagnostics, and rounds with no simulated-trade series use distinct markers. Round fifteen produced no evaluation trades.</desc>
<rect width="100%" height="100%" fill="#ffffff"/>
