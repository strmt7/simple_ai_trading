<svg xmlns="http://www.w3.org/2000/svg" width="1500" height="620" viewBox="0 0 1500 620" role="img" aria-labelledby="title desc">
<title id="title">After-cost evidence by research round</title>
<desc id="desc">Executed means, overlapping-forecast diagnostics, and rounds with no executable series use distinct markers. Rounds 15 through 25 produced no evaluation trades.</desc>
