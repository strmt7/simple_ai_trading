<text x="748.0" y="254" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="13" fill="#263746"><tspan x="748.0" dy="0">Passed</tspan><tspan x="748.0" dy="19">forecast gates</tspan></text>
