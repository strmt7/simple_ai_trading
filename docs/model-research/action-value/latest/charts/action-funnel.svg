<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="470" viewBox="0 0 1600 470" role="img" aria-labelledby="title desc">
<title id="title">Round 15 action funnel</title>
<desc id="desc">Twenty-one model fits produced eighty-four threshold traces. None passed, so evaluation remained in abstention and no candidate was created.</desc>
<rect width="100%" height="100%" fill="#ffffff"/>
<text x="56" y="54" font-family="Segoe UI, Arial, sans-serif" font-size="28" font-weight="700" fill="#17212b">Mandatory abstention stopped failed thresholds</text>
<text x="56" y="84" font-family="Segoe UI, Arial, sans-serif" font-size="15" fill="#52606d">The funnel reports operational evidence; zero evaluation trades is a safety outcome, not a profitability result.</text>
<rect x="75.0" y="145" width="274" height="150" rx="6" fill="#edf6f7" stroke="#147d8f" stroke-width="2"/>
<text x="212.0" y="215" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="40" font-weight="700" fill="#147d8f">21</text>
<text x="212.0" y="252" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="13" fill="#263746"><tspan x="212.0">causal daily</tspan><tspan x="212.0" dy="19">model fits</tspan></text>
<rect x="369.0" y="145" width="274" height="150" rx="6" fill="#edf6f7" stroke="#147d8f" stroke-width="2"/>
<text x="506.0" y="215" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="40" font-weight="700" fill="#147d8f">84</text>
<text x="506.0" y="252" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="13" fill="#263746"><tspan x="506.0">prior-only</tspan><tspan x="506.0" dy="19">threshold traces</tspan></text>
<rect x="663.0" y="145" width="274" height="150" rx="6" fill="#fff5f4" stroke="#b44a45" stroke-width="2"/>
<text x="800.0" y="215" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="40" font-weight="700" fill="#b44a45">0</text>
<text x="800.0" y="252" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="13" fill="#263746"><tspan x="800.0">accepted</tspan><tspan x="800.0" dy="19">thresholds</tspan></text>
<rect x="957.0" y="145" width="274" height="150" rx="6" fill="#fff5f4" stroke="#b44a45" stroke-width="2"/>
<text x="1094.0" y="215" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="40" font-weight="700" fill="#b44a45">0</text>
<text x="1094.0" y="252" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="13" fill="#263746"><tspan x="1094.0">evaluation</tspan><tspan x="1094.0" dy="19">trades</tspan></text>
<rect x="1251.0" y="145" width="274" height="150" rx="6" fill="#fff5f4" stroke="#b44a45" stroke-width="2"/>
<text x="1388.0" y="215" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="40" font-weight="700" fill="#b44a45">0</text>
<text x="1388.0" y="252" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="13" fill="#263746"><tspan x="1388.0">research</tspan><tspan x="1388.0" dy="19">candidates</tspan></text>
<text x="56" y="387" font-family="Segoe UI, Arial, sans-serif" font-size="13" fill="#65727d">No trade, leverage, portfolio return, ROI, or profitability authority was produced.</text>
