<text x="462.0" y="254" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="13" fill="#263746"><tspan x="462.0" dy="0">Final models</tspan><tspan x="462.0" dy="19">with baseline</tspan></text>
<line x1="590" y1="220" x2="619" y2="220" stroke="#7b8994" stroke-width="2"/>
<path d="M 619 214 L 628 220 L 619 226 Z" fill="#7b8994"/>
