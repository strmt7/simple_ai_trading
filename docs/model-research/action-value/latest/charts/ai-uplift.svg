<text x="56" y="52" class="title">AI-assisted factors changed point estimates but did not establish uplift</text>
<text x="56" y="80" class="subtitle">Pre-registered long-only comparison; the paired 168-hour block-bootstrap interval crosses zero and drawdown worsened.</text>
