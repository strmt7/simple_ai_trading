<svg xmlns="http://www.w3.org/2000/svg" width="1500" height="650" viewBox="0 0 1500 650" role="img" aria-labelledby="title desc">
<title id="title">AI-assisted factors changed point estimates but did not establish uplift</title>
<desc id="desc">Pre-registered long-only comparison; the paired 168-hour block-bootstrap interval crosses zero and drawdown worsened.</desc>
<rect width="100%" height="100%" fill="#ffffff"/>
