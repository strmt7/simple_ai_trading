<svg xmlns="http://www.w3.org/2000/svg" width="1420" height="760" viewBox="0 0 1420 760" role="img" aria-labelledby="title desc">
<title id="title">FinCast did not establish AI uplift</title>
<desc id="desc">Matched deterministic control and 991M-parameter FinCast treatment on identical evaluation endpoints.</desc>
<rect width="100%" height="100%" fill="#ffffff"/>
<style>text{font-family:"Segoe UI",Arial,sans-serif;letter-spacing:0}.title{font-size:28px;font-weight:700;fill:#17212b}.subtitle{font-size:14px;fill:#52606d}.label{font-size:13px;fill:#263746}.axis{font-size:12px;fill:#60717f}.value{font-size:12px;font-weight:650;fill:#263746}.note{font-size:12px;fill:#65727d}.grid{stroke:#e1e8ed;stroke-width:1}.zero{stroke:#526674;stroke-width:2;stroke-dasharray:6 5}.gate{stroke:#b42318;stroke-width:2;stroke-dasharray:5 4}</style>
<text x="56" y="52" class="title">FinCast did not establish AI uplift</text>
<text x="56" y="80" class="subtitle">Matched deterministic control and 991M-parameter FinCast treatment on identical evaluation endpoints.</text>
