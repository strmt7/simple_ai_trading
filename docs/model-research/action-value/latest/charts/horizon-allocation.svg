<svg xmlns="http://www.w3.org/2000/svg" width="1500" height="680" viewBox="0 0 1500 680" role="img" aria-labelledby="title desc">
<title id="title">Frozen policy horizon concentration</title>
<desc id="desc">Share of base-ledger trades by holding horizon; no quota was forced.</desc>
<rect width="100%" height="100%" fill="#ffffff"/>
<style>text{font-family:"Segoe UI",Arial,sans-serif;letter-spacing:0}.title{font-size:27px;font-weight:700;fill:#17212b}.subtitle{font-size:14px;fill:#52606d}.label{font-size:13px;fill:#263746}.axis{font-size:12px;fill:#60717f}.value{font-size:12px;font-weight:650;fill:#263746}.note{font-size:12px;fill:#65727d}.grid{stroke:#e1e8ed;stroke-width:1}.zero{stroke:#526674;stroke-width:2;stroke-dasharray:6 5}</style>
<text x="56" y="52" class="title">Frozen policy horizon concentration</text>
<text x="56" y="80" class="subtitle">Share of base-ledger trades by holding horizon; no quota was forced.</text>
<line x1="900" y1="53" x2="934" y2="53" stroke="#2563a6" stroke-width="4"/><text x="944" y="58" class="note">Single logistic control</text>
<line x1="1170" y1="53" x2="1204" y2="53" stroke="#0f766e" stroke-width="4"/><text x="1214" y="58" class="note">State-conditioned mixture</text>
<line x1="150" y1="540.0" x2="1430" y2="540.0" class="grid"/><text x="136" y="544.0" text-anchor="end" class="axis">0%</text>
<line x1="150" y1="345.0" x2="1430" y2="345.0" class="grid"/><text x="136" y="349.0" text-anchor="end" class="axis">50%</text>
<line x1="150" y1="150.0" x2="1430" y2="150.0" class="grid"/><text x="136" y="154.0" text-anchor="end" class="axis">100%</text>
<rect x="209.0" y="540.0" width="92" height="0.0" fill="#2563a6"/>
<text x="255.0" y="532.0" text-anchor="middle" class="value">0.0%</text>
<rect x="319.0" y="540.0" width="92" height="0.0" fill="#0f766e"/>
<text x="365.0" y="532.0" text-anchor="middle" class="value">0.0%</text>
<text x="310.0" y="570" text-anchor="middle" class="axis">15m</text>
<rect x="529.0" y="539.8" width="92" height="0.2" fill="#2563a6"/>
<text x="575.0" y="531.8" text-anchor="middle" class="value">0.1%</text>
<rect x="639.0" y="540.0" width="92" height="0.0" fill="#0f766e"/>
<text x="685.0" y="532.0" text-anchor="middle" class="value">0.0%</text>
<text x="630.0" y="570" text-anchor="middle" class="axis">30m</text>
<rect x="849.0" y="531.8" width="92" height="8.2" fill="#2563a6"/>
<text x="895.0" y="523.8" text-anchor="middle" class="value">2.1%</text>
<rect x="959.0" y="539.0" width="92" height="1.0" fill="#0f766e"/>
<text x="1005.0" y="531.0" text-anchor="middle" class="value">0.3%</text>
<text x="950.0" y="570" text-anchor="middle" class="axis">60m</text>
<rect x="1169.0" y="158.4" width="92" height="381.6" fill="#2563a6"/>
