<rect x="1279.0" y="151.0" width="92" height="389.0" fill="#0f766e"/>
<text x="1325.0" y="143.0" text-anchor="middle" class="value">99.7%</text>
<text x="1270.0" y="570" text-anchor="middle" class="axis">120m</text>
<text x="56" y="625" class="note">The control placed 97.8% and the mixture 99.7% of trades at 120 minutes, despite the strongest action AUC occurring at 15 minutes.</text>
</svg>
