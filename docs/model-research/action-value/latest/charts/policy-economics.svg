<svg xmlns="http://www.w3.org/2000/svg" width="1500" height="700" viewBox="0 0 1500 700" role="img" aria-labelledby="title desc">
<title id="title">Fixed-ledger after-cost economics</title>
<desc id="desc">Base and stress point estimates are shown with drawdown and familywise block-bootstrap uncertainty; all data are consumed development evidence.</desc>
