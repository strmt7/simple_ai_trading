<svg xmlns="http://www.w3.org/2000/svg" width="1500" height="620" viewBox="0 0 1500 620" role="img" aria-labelledby="title desc">
<title id="title">Independent-seed output stability</title>
<desc id="desc">Minimum pairwise Spearman across all peer pairs; every output family must exceed the frozen 0.50 floor.</desc>
