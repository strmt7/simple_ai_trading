<svg xmlns="http://www.w3.org/2000/svg" width="1500" height="520" viewBox="0 0 1500 520" role="img" aria-labelledby="title desc">
<title id="title">Probability was stable; action value was not</title>
<desc id="desc">Minimum pairwise seed Spearman on consumed 2025-H1; frozen minimum is 0.50 for both outputs.</desc>
