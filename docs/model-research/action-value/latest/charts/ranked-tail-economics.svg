<title id="title">Round 23 net returns for highest-ranked signals</title>
<desc id="desc">Mean adverse-stress net return in basis points for the 100 and 500 highest-ranked signals in threshold-selection and out-of-sample validation windows during June 2023. One or more displayed means are positive, but no threshold passed the precommitted stress controls.</desc>
