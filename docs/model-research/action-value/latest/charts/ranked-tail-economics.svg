<title id="title">Round 29 net returns for highest-ranked signals</title>
<desc id="desc">Mean adverse-stress net return in basis points for the 100 and 500 highest-ranked signals in threshold-selection and policy-validation windows during June 2023. The policy window has been reused across research rounds. Every displayed mean is negative.</desc>
