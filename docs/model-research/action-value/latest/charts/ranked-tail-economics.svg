<title id="title">Round 30 net returns for highest-ranked signals</title>
<desc id="desc">Mean adverse-stress net return in basis points for the 100 and 500 highest-ranked signals in threshold selection from 2023-06-21 to 2023-06-25 UTC and reused policy validation from 2023-06-26 to 2023-06-30 UTC. One or more displayed means are positive, but no threshold passed the precommitted stress controls.</desc>
