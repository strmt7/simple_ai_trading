version: 2

updates:
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: monthly
    cooldown:
      default-days: 7
    groups:
      github-actions:
        patterns:
          - "*"

  - package-ecosystem: uv
    directory: /
    schedule:
      interval: monthly
    cooldown:
      default-days: 7
    groups:
      routine-python:
        patterns:
          - "*"
        exclude-patterns:
          - hftbacktest
          - lightgbm
          - numba
          - numpy
          - scipy
          - torch
          - torch-directml
          - torchvision
