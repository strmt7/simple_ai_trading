name: super-linter

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  super-linter:
    name: Super-Linter
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: read # Required to pull the pinned Super-Linter container from GHCR.
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Super-Linter
        env:
          DEFAULT_BRANCH: ${{ github.event.repository.default_branch }}
          FILTER_REGEX_EXCLUDE: (^|/)(\.tmp|\.venv[^/]*|build|dist|htmlcov|out)/
          LINTER_RULES_PATH: .
          MARKDOWN_CONFIG_FILE: .markdownlint.yaml
          RUN_LOCAL: 'true'
          YAML_CONFIG_FILE: .yamllint
          VALIDATE_ALL_CODEBASE: 'true'
          VALIDATE_GIT_MERGE_CONFLICT_MARKERS: 'true'
          VALIDATE_GITHUB_ACTIONS: 'true'
          VALIDATE_GITHUB_ACTIONS_ZIZMOR: 'true'
          VALIDATE_MARKDOWN: 'true'
          VALIDATE_YAML: 'true'
        run: |
          docker run --rm \
            --workdir "${GITHUB_WORKSPACE}" \
            -e DEFAULT_BRANCH \
            -e DEFAULT_WORKSPACE="${GITHUB_WORKSPACE}" \
            -e FILTER_REGEX_EXCLUDE \
            -e LINTER_RULES_PATH \
            -e MARKDOWN_CONFIG_FILE \
            -e RUN_LOCAL \
            -e YAML_CONFIG_FILE \
            -e VALIDATE_ALL_CODEBASE \
            -e VALIDATE_GIT_MERGE_CONFLICT_MARKERS \
            -e VALIDATE_GITHUB_ACTIONS \
            -e VALIDATE_GITHUB_ACTIONS_ZIZMOR \
            -e VALIDATE_MARKDOWN \
            -e VALIDATE_YAML \
            -v "${GITHUB_WORKSPACE}:${GITHUB_WORKSPACE}" \
            ghcr.io/super-linter/super-linter:v8.7.0@sha256:c05768164eed53bac7c82aade7a14a76955206d4962cd41be97118db96fa5996
