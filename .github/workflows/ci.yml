name: CI

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test-with-coverage:
    runs-on: ubuntu-24.04
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: pyproject.toml

      - name: Install project and test dependencies
        run: |
          python3 -m pip install -q -e .
          python3 -m pip install -q pytest coverage

      - name: Run tests with coverage
        run: |
          python3 -m coverage run --source=src/simple_ai_trading -m pytest -q
          python3 -m coverage xml
          python3 -m coverage report --fail-under=95
          python3 -m coverage html

      - name: Smoke POSIX launchers
        run: |
          sh ./run-shell.sh --help
          sh ./run-gui.sh --help

      - name: Upload HTML coverage artifact
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: coverage-html
          path: htmlcov

      - name: Upload coverage report to Codecov
        if: always() && github.event_name == 'push' && github.ref_name == github.event.repository.default_branch
        uses: codecov/codecov-action@v6
        with:
          files: ./coverage.xml
          token: ${{ secrets.CODECOV_TOKEN }}
          fail_ci_if_error: true

  windows-python311-smoke:
    runs-on: windows-2025
    timeout-minutes: 10
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Python 3.11
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: pyproject.toml

      - name: Install project
        run: |
          python -m pip install -q -e .
          python -m pip install -q pytest

      - name: Smoke CLI and Windows launchers
        shell: pwsh
        run: |
          python -m simple_ai_trading --help
          python -m simple_ai_trading objectives
          powershell -ExecutionPolicy Bypass -File tools\build_native_windows.ps1
          python -m simple_ai_trading.windows_app --help
          .\run-shell.cmd --help
          .\run-gui.cmd --help
          if (Get-Command py -ErrorAction SilentlyContinue) {
            py -3.11 -m simple_ai_trading --help
          }

      - name: Run Windows terminal regression tests
        shell: pwsh
        run: |
          $env:TEMP = Join-Path $pwd ".pytest-tmp"
          $env:TMP = $env:TEMP
          New-Item -ItemType Directory -Force -Path $env:TEMP | Out-Null
          python -m pytest -q tests/test_tui.py tests/test_style.py tests/test_shell.py tests/test_cli.py -p no:cacheprovider --basetemp .pytest-tmp/windows-ci
