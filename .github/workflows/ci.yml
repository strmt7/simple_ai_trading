name: CI

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test-with-coverage:
    name: Python tests and coverage
    runs-on: ubuntu-24.04
    permissions:
      contents: read
    env:
      CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Setup Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: "3.12"

      - name: Setup uv
        uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990 # v8.3.2
        with:
          version: "0.11.29"
          enable-cache: true

      - name: Install project and test dependencies
        run: uv sync --locked --extra foundation-ai --extra gpu --group test

      - name: Audit financial terminology
        run: uv run --locked python tools/audit_financial_terminology.py

      - name: Run tests with coverage
        run: |
          uv run --locked coverage run --source=src/simple_ai_trading -m pytest -q
          uv run --locked coverage xml
          uv run --locked coverage report
          uv run --locked coverage html

      - name: Enforce changed-line coverage
        env:
          EVENT_NAME: ${{ github.event_name }}
          BASE_REF: ${{ github.base_ref }}
        run: |
          if [ "$EVENT_NAME" = "pull_request" ]; then
            compare_branch="origin/$BASE_REF"
          else
            compare_branch="HEAD^"
          fi
          uv run --locked diff-cover coverage.xml --compare-branch="$compare_branch" --fail-under=95

      - name: Smoke POSIX launchers
        run: |
          sh ./run-shell.sh --help
          sh ./run-gui.sh --help

      - name: Upload HTML coverage artifact
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: coverage-html
          path: htmlcov

      - name: Upload coverage report to Codecov
        if: >-
          always() &&
          github.event_name == 'push' &&
          github.ref_name == github.event.repository.default_branch &&
          env.CODECOV_TOKEN != ''
        uses: codecov/codecov-action@fb8b3582c8e4def4969c97caa2f19720cb33a72f # v7.0.0
        with:
          files: ./coverage.xml
          token: ${{ env.CODECOV_TOKEN }}
          fail_ci_if_error: true

  windows-python311-smoke:
    name: Windows Python 3.11 and native UI smoke
    runs-on: windows-2025
    timeout-minutes: 10
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Setup Python 3.11
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: "3.11"

      - name: Setup uv
        uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990 # v8.3.2
        with:
          version: "0.11.29"
          enable-cache: true

      - name: Install project
        run: uv sync --locked --group test

      - name: Smoke CLI and Windows launchers
        shell: pwsh
        run: |
          uv run --locked python -m simple_ai_trading --help
          uv run --locked python -m simple_ai_trading objectives
          uv run --locked powershell -ExecutionPolicy Bypass -File tools\build_native_windows.ps1
          uv run --locked powershell -ExecutionPolicy Bypass -File tools\smoke_native_windows_ui.ps1 -SkipRealCompute
          uv run --locked powershell -ExecutionPolicy Bypass -File tools\validate_native_windows_layout.ps1
          uv run --locked python -m simple_ai_trading.windows_app --help
          .\run-shell.cmd --help
          .\run-gui.cmd --help
          if (Get-Command py -ErrorAction SilentlyContinue) {
            uv run --locked py -3.11 -m simple_ai_trading --help
          }

      - name: Run Windows terminal regression tests
        shell: pwsh
        run: |
          $env:TEMP = Join-Path $pwd ".pytest-tmp"
          $env:TMP = $env:TEMP
          New-Item -ItemType Directory -Force -Path $env:TEMP | Out-Null
          uv run --locked pytest -q tests/test_tui.py tests/test_style.py tests/test_shell.py tests/test_cli.py -p no:cacheprovider --basetemp .pytest-tmp/windows-ci
