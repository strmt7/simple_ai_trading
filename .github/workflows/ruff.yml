name: ruff

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}-${{ github.sha }}
  cancel-in-progress: true

jobs:
  ruff:
    name: Ruff
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Install Ruff
        uses: astral-sh/ruff-action@278981a28ce3188b1e39527901f38254bf3aac89 # v4.1.0
        with:
          version: 0.15.22
          args: --version

      - name: Ruff check
        run: ruff check .

      - name: Ruff format changed Python ranges
        env:
          BASE_SHA: ${{ github.event.pull_request.base.sha || github.event.before }}
        shell: bash
        run: |
          set -euo pipefail
          base="${BASE_SHA:-}"
          if [[ -z "${base}" || "${base}" =~ ^0+$ ]] || ! git cat-file -e "${base}^{commit}" 2>/dev/null; then
            base="$(git rev-parse HEAD^ 2>/dev/null || git hash-object -t tree /dev/null)"
          fi
          # Check new files in full and only changed ranges in legacy files so
          # unrelated formatting debt cannot force repository-wide churn.
          changed="${RUNNER_TEMP}/ruff-python-files"
          git diff --name-only --diff-filter=ACMR -z "${base}" HEAD -- '*.py' > "${changed}"
          if [[ ! -s "${changed}" ]]; then
            echo "No changed Python files."
            exit 0
          fi
          emit_lines() {
            local start count last
            while read -r start count; do
              [[ -n "${start}" ]] || continue
              count="${count:-1}"
              if (( count == 0 )); then
                printf '%s\n' "${start}"
              else
                last=$((start + count - 1))
                seq "${start}" "${last}"
              fi
            done
          }
          while IFS= read -r -d '' file; do
            if ! git cat-file -e "${base}:${file}" 2>/dev/null; then
              ruff format --check -- "${file}"
              continue
            fi
            changed_diff="${RUNNER_TEMP}/ruff-changed.diff"
            changed_lines="${RUNNER_TEMP}/ruff-changed.lines"
            formatted="${RUNNER_TEMP}/ruff-formatted.py"
            format_diff="${RUNNER_TEMP}/ruff-format.diff"
            format_lines="${RUNNER_TEMP}/ruff-format.lines"
            git diff --unified=0 --no-color "${base}" HEAD -- "${file}" > "${changed_diff}"
            sed -nE 's/^@@ -[0-9]+(,[0-9]+)? \+([0-9]+)(,([0-9]+))? @@.*/\2 \4/p' "${changed_diff}" |
              emit_lines | sort -n -u > "${changed_lines}"
            ruff format --stdin-filename "${file}" - < "${file}" > "${formatted}"
            diff_status=0
            git diff --no-index --unified=0 --no-color -- "${file}" "${formatted}" > "${format_diff}" || diff_status=$?
            if (( diff_status > 1 )); then
              echo "Could not compare Ruff output for ${file}." >&2
              exit "${diff_status}"
            fi
            sed -nE 's/^@@ -([0-9]+)(,([0-9]+))? \+[0-9]+(,[0-9]+)? @@.*/\1 \3/p' "${format_diff}" |
              emit_lines | sort -n -u > "${format_lines}"
            overlap="$(comm -12 "${changed_lines}" "${format_lines}" | sed -n '1p')"
            if [[ -n "${overlap}" ]]; then
              echo "Ruff would reformat changed line ${overlap} in ${file}." >&2
              git diff --no-index --unified=3 --no-color -- "${file}" "${formatted}" |
                sed -n '1,120p' || true
              exit 1
            fi
          done < "${changed}"
