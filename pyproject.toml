[build-system]
requires = ["setuptools>=64.0"]
build-backend = "setuptools.build_meta"

[project]
name = "simple-ai-trading"
version = "0.1.0b1"
description = "Autonomous multi-asset day-trading CLI and Windows app with conservative testnet-first safeguards"
readme = "README.md"
requires-python = ">=3.11"
dependencies = [
    "defusedxml>=0.7.1,<1",
    "requests>=2.32.0,<3",
    "textual==8.1.1",
]

[project.optional-dependencies]
gpu = [
    "torch>=2.4,<3; platform_system != 'Windows'",
    "torch-directml==0.2.5.dev240914; platform_system == 'Windows' and python_version < '3.12'",
]
terminal-test = [
    "pyte>=0.8.2,<1",
    "pywinpty>=3.0.3,<4; platform_system == 'Windows'",
    "pexpect>=4.9.0,<5; platform_system != 'Windows'",
]

[project.scripts]
simple-ai-trading = "simple_ai_trading.cli:main"
simple-ai-trading-windows = "simple_ai_trading.windows_app:main"

[tool.pytest.ini_options]
addopts = ["-q"]

[tool.coverage.run]
branch = true
source = ["src/simple_ai_trading"]
omit = ["src/simple_ai_trading/__main__.py"]

[tool.coverage.report]
skip_empty = true
show_missing = true
fail_under = 95
