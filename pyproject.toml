[build-system]
requires = ["setuptools>=64.0"]
build-backend = "setuptools.build_meta"

[project]
name = "simple-ai-bitcoin-trading-binance"
version = "0.1.0"
description = "BTCUSDC paper-trading CLI with conservative Binance testnet workflow"
readme = "README.md"
requires-python = ">=3.11"
dependencies = [
    "requests>=2.32.0,<3",
    "textual==8.1.1",
]

[project.optional-dependencies]
gpu = [
    "torch>=2.4,<3",
    "torch-directml==0.2.5.dev240914; platform_system == 'Windows' and python_version < '3.12'",
]

[project.scripts]
simple-ai-trading = "simple_ai_bitcoin_trading_binance.cli:main"

[tool.pytest.ini_options]
addopts = ["-q"]

[tool.coverage.run]
branch = true
source = ["src/simple_ai_bitcoin_trading_binance"]
omit = ["src/simple_ai_bitcoin_trading_binance/__main__.py"]

[tool.coverage.report]
skip_empty = true
show_missing = true
fail_under = 100
